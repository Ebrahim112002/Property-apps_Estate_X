name: estatex
description: "A Verified Real Estate Marketplace with Smart Bidding."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.7 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- Core & Backend ---
  supabase_flutter: ^2.0.2     # ডাটাবেস, রিয়েল-টাইম বিডিং এবং অথেনটিকেশনের জন্য
  provider: ^6.1.1             # স্টেট ম্যানেজমেন্টের জন্য (User & UI State)
  
  # --- Navigation & Routing ---
  go_router: ^13.2.0           # ডাইনামিক রাউটিং এবং ডিপ লিঙ্কিংয়ের জন্য (EstateX-এর জন্য সেরা)

  # --- UI & Design ---
  google_fonts: ^6.1.0         # প্রিমিয়াম ফন্ট
  flutter_svg: ^2.0.9          # ভেক্টর আইকন ও ইলাস্ট্রেশনের জন্য
  flutter_spinkit: ^5.2.0      # সুন্দর লোডিং অ্যানিমেশন
  shimmer: ^3.0.0              # ডেটা লোড হওয়ার সময় Skeleton Loader-এর জন্য
  font_awesome_flutter: ^10.7.0 # সোশ্যাল এবং অন্যান্য আইকনের জন্য

  # --- Media & Files ---
  image_picker: ^1.0.7         # প্রপার্টি ইমেজ সিলেক্ট করার জন্য
  cached_network_image: ^3.3.1 # নেটওয়ার্ক থেকে প্রপার্টি ইমেজ দ্রুত দেখানোর জন্য

  # --- Maps & Location (রিয়েল এস্টেটের জন্য মাস্ট) ---
  google_maps_flutter: ^2.5.3  # প্রপার্টির লোকেশন ম্যাপে দেখার জন্য
  geolocator: ^11.0.0          # ইউজারের বর্তমান লোকেশন পাওয়ার জন্য

  # --- Real-time & Bidding Features ---
  intl: ^0.19.0                # তারিখ এবং কারেন্সি (Currency) ফরম্যাট করার জন্য
  timeago: ^3.6.1              # বিড করার সময় "2 minutes ago" এমন দেখানোর জন্য
  flutter_countdown_timer: ^4.1.0 # স্মার্ট বিডিংয়ের সময় শেষ হওয়ার কাউন্টডাউন

  # --- Notifications ---
  flutter_local_notifications: ^17.0.0 # বিড আপডেট বা নতুন প্রপার্টির নোটিফিকেশনের জন্য

  # --- Payment (প্রিমিয়াম ফিচারের জন্য) ---
  flutter_stripe: ^10.1.1      # পেমেন্ট গেটওয়ে ইন্টিগ্রেশনের জন্য (যদি প্রয়োজন হয়)
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # এসেট ফোল্ডার ডিক্লেয়ারেশন
  assets:
    - assets/images/
    - assets/icons/